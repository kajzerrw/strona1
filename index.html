  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .name {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    color: #e8e4de;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .name em { font-style: italic; color: rgba(232,228,222,0.5); }

  .sub {
    font-size: 11px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 28px;
  }

  .socials { display: flex; gap: 8px; margin-bottom: 20px; }

  .pill {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.09);
    text-decoration: none;
    color: rgba(255,255,255,0.55);
    font-size: 11.5px; font-weight: 300;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .pill:hover {
    background: rgba(255,255,255,0.11);
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.18);
  }
  .pill svg { width: 13px; height: 13px; opacity: 0.7; flex-shrink: 0; }

  /* ── MUSIC PLAYER ── */
  .player {
    margin-bottom: 24px;
    width: 260px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    padding: 12px 14px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .player:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
  }

  .player-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .player-icon {
    width: 34px; height: 34px;
    border-radius: 7px;
    background: rgba(30,215,96,0.12);
    border: 1px solid rgba(30,215,96,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .player-icon svg { width: 16px; height: 16px; fill: #1ed760; }

  .player-info { flex: 1; overflow: hidden; }
  .player-title {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .player-artist {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
  }

  .player-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .player-btn:hover { background: rgba(255,255,255,0.15); }
  .player-btn svg { width: 11px; height: 11px; fill: rgba(255,255,255,0.7); }

  /* progress bar */
  .player-bar {
    position: relative;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    cursor: pointer;
    margin-bottom: 6px;
  }
  .player-progress {
    height: 100%;
    background: rgba(30,215,96,0.7);
    border-radius: 999px;
    width: 0%;
    transition: width 0.5s linear;
    pointer-events: none;
  }

  .player-times {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
  }

  /* bars animation when playing */
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }
  .bar {
    width: 3px;
    border-radius: 2px;
    background: #1ed760;
    animation: none;
  }
  .playing .bar:nth-child(1) { animation: bounce 0.7s 0.0s ease-in-out infinite alternate; }
  .playing .bar:nth-child(2) { animation: bounce 0.7s 0.15s ease-in-out infinite alternate; }
  .playing .bar:nth-child(3) { animation: bounce 0.7s 0.3s ease-in-out infinite alternate; }
  .playing .bar:nth-child(4) { animation: bounce 0.7s 0.1s ease-in-out infinite alternate; }

  @keyframes bounce {
    from { height: 3px; }
    to   { height: 14px; }
  }
  .bar { height: 3px; }

  .views {
    font-size: 11px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 5px;
  }
  .views-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
  }

  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.7);
    font-size: 11px; padding: 8px 16px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 10;
    font-family: 'Geist Mono', monospace;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="toast" id="toast">copied to clipboard</div>

<audio id="audio" src="music.mp3" preload="metadata"></audio>

<script>
  /* ── STAGGER ── */
  [0,1,2,3,4,5].forEach(i => {
    const el = document.getElementById('s'+i);
    setTimeout(() => {
      el.style.transition = 'opacity 0.65s cubic-bezier(.16,1,.3,1), transform 0.65s cubic-bezier(.16,1,.3,1)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, 200 + i * 110);
  });

  /* ── PARALLAX ── */
  const bg = document.getElementById('bg');
  let mx=0, my=0, cx=0, cy=0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX/innerWidth  - 0.5) * 28;
    my = (e.clientY/innerHeight - 0.5) * 18;
  });
  (function raf() {
    cx += (mx-cx)*0.07; cy += (my-cy)*0.07;
    bg.style.transform = `translate(${cx}px,${cy}px) scale(1.08)`;
    requestAnimationFrame(raf);
  })();

  /* ── PARTICLES ── */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width=innerWidth; canvas.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const pts = Array.from({length:90}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*1.4+0.3,
    vy: Math.random()*0.5+0.2,
    vx: Math.random()*0.3-0.15,
    o: Math.random()*0.35+0.05
  }));
  (function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.o})`;
      ctx.fill();
      p.y+=p.vy; p.x+=p.vx;
      if(p.y>canvas.height+4){ p.y=-4; p.x=Math.random()*canvas.width; }
      if(p.x<-4) p.x=canvas.width+4;
      if(p.x>canvas.width+4) p.x=-4;
    });
    requestAnimationFrame(draw);
  })();

  /* ── AUDIO PLAYER ── */
  const audio = document.getElementById('audio');
  const progress = document.getElementById('progress');
  const timeEl = document.getElementById('timeEl');
  const durEl = document.getElementById('durEl');
  const playIcon = document.getElementById('playIcon');
  const bars = document.getElementById('bars');
  let playing = false;

  function fmt(s) {
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
  }

  audio.addEventListener('loadedmetadata', () => {
    durEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if(!audio.duration) return;
    progress.style.width = (audio.currentTime/audio.duration*100)+'%';
    timeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    playing = false;
    setPlayIcon(false);
    bars.classList.remove('playing');
    progress.style.width = '0%';
    audio.currentTime = 0;
  });

  function setPlayIcon(isPlaying) {
    playIcon.innerHTML = isPlaying
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

  function togglePlay() {
    if(playing) {
      audio.pause();
      playing = false;
      setPlayIcon(false);
      bars.classList.remove('playing');
    } else {
      audio.play();
      playing = true;
      setPlayIcon(true);
      bars.classList.add('playing');
    }
  }

  function seekTo(e) {
    e.stopPropagation();
    const bar = document.getElementById('playerBar');
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }

  /* ── DISCORD ── */
  function copyDiscord() {
    navigator.clipboard.writeText('kajzerr');
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('vc').textContent = (1247).toLocaleString();
</script>
</body>
